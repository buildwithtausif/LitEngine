<svg width="100%" height="100%" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blurFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" />
    </filter>
  </defs>
  
  <!-- Base Background -->
  <rect width="1440" height="1024" fill="transparent" />

  <!-- Mesh Gradient Blobs -->
  <g filter="url(#blurFilter)" opacity="0.5">
    <!-- Top Left - Soft Blue -->
    <circle cx="200" cy="200" r="300" fill="#3b82f6" opacity="0.3" class="dark:opacity-0.2" />
    
    <!-- Bottom Right - Soft Green -->
    <circle cx="1200" cy="800" r="350" fill="#22c55e" opacity="0.3" class="dark:opacity-0.2" />
    
    <!-- Center - Soft Slate/Purple -->
    <circle cx="720" cy="512" r="250" fill="#8b5cf6" opacity="0.2" class="dark:opacity-0.1" />
    
    <!-- Top Right - Cyan -->
    <circle cx="1300" cy="100" r="200" fill="#06b6d4" opacity="0.25" />
    
    <!-- Bottom Left - Amber (Subtle warmth) -->
    <circle cx="100" cy="900" r="250" fill="#f59e0b" opacity="0.15" />
  </g>
  
  <!-- Subtle Wave Overlay (Visible Line) -->
  <path d="M0,320 C320,400 480,240 720,320 C960,400 1120,240 1440,320 V1024 H0 Z" fill="url(#gradWave)" opacity="0.05" />
  
  <defs>
    <linearGradient id="gradWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
